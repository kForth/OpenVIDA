{% extends "layout.html" %}
{% block page_title %}Resources{%endblock%}
{% block content %}
<div class="content-shell content-gradient">
	<div class="container h-100 py-3">
		<div class="content-panel h-100 col-12 mx-auto p-4 d-flex flex-column">
            <div class="mb-3 w-100">
                <label for="resourceSelect" class="h4 mb-1">Resources</label>
                <p class="text-muted mb-0">Select a PDF resource to view it below.</p>
                <select
                    id="resourceSelect"
                    class="form-control w-100"
                    data-bind="value: selectedResourcePath, options: resources, optionsText: 'filename', optionsValue: 'url'"
                ></select>
            </div>

            <div class="flex-fill border border-dark-subtle rounded-4 overflow-hidden bg-secondary-subtle">
                <iframe
                    class="w-100 h-100 border-none"
                    title="Resource PDF viewer"
                    data-bind="attr: {src: selectedResourcePath}"
                ></iframe>
            </div>
        </div>
    </div>
</div>
{% endblock %} {% block js%}
<script
    type="text/javascript"
    src="{{ url_for('static', filename='js/resources.js') }}"
></script>
{% endblock %}
