{% extends "layout.html" %}
{% block page_title %}Profiles{%endblock%}
{% block content %}
<div class="content-shell content-gradient py-4">
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4 order-lg-last">
                <div class="content-panel profile-preview p-4 position-sticky">
                    <p class="fw-semibold text-uppercase">Vehicle Preview</p>
                    <img class="d-block w-100 object-fit-contain" data-bind="attr: {src: imagePath}" alt="Selected vehicle preview" />
                </div>
            </div>
            <div class="col-lg-8">
                <div class="content-panel p-4">
                    <div class="mb-4">
                        <h4 class="mb-2">Vehicle Profile</h4>
                        <p class="text-muted mb-0">Select or decode your Volvo profile to tailor parts and document results.</p>
                    </div>
                    <form onsubmit="return false;">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="partnerGroup" class="form-label"
                                    >Partner Group</label
                                >
                                <select
                                    class="form-control"
                                    id="partnerGroup"
                                    data-bind="value: partnerGroup, options: partnerGroupOptions, optionsValue: 'id', optionsText: 'text'"
                                ></select>
                            </div>
                            <hr />
                            <div class="col-12 mb-1">
                                <p class="profile-subtitle">VIN Decode</p>
                                <label for="vin" class="form-label">VIN</label>
                                <div class="input-group">
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="vin"
                                        data-bind="value: vinNumber"
                                    />
                                    <button
                                        class="btn btn-primary"
                                        id="submitVin"
                                        data-bind="click: loadProfileFromVin"
                                    >
                                        Submit
                                    </button>
                                </div>
                            </div>
                            <hr />
                            <div class="col-12 mb-1">
                                <p class="profile-subtitle">Manual Selection</p>
                            </div>
                            <div class="col-sm-6">
                                <label for="vehicleModel" class="form-label"
                                    >Model</label
                                >
                                <input
                                    id="vehicleModel"
                                    type="text"
                                    class="form-control"
                                    data-bind="jqAuto: {value: vehicleModel, source: vehicleModelOptions, valueProp: 'id', labelProp: 'text', options: {minLength: 0}}"
                                />
                            </div>
                            <div class="col-sm-6">
                                <label for="modelYear" class="form-label"
                                    >Model Year</label
                                >
                                <input
                                    class="form-control"
                                    id="modelYear"
                                    data-bind="jqAuto: {value: modelYear, source: modelYearOptions, valueProp: 'id', labelProp: 'text', options: {minLength: 0}}"
                                />
                            </div>
                            <div class="col-sm-6">
                                <label for="engine" class="form-label">Engine</label>
                                <input
                                    class="form-control"
                                    id="engine"
                                    data-bind="jqAuto: {value: engine, source: engineOptions, valueProp: 'id', labelProp: 'text', options: {minLength: 0}}"
                                />
                            </div>
                            <div class="col-sm-6">
                                <label for="transmission" class="form-label"
                                    >Transmission</label
                                >
                                <input
                                    class="form-control"
                                    id="transmission"
                                    data-bind="jqAuto: {value: transmission, source: transmissionOptions, valueProp: 'id', labelProp: 'text', options: {minLength: 0}}"
                                />
                            </div>
                            <div class="col-sm-4">
                                <label for="steering" class="form-label"
                                    >Steering</label
                                >
                                <select
                                    class="form-control"
                                    id="steering"
                                    data-bind="value: steering, options: steeringOptions, optionsValue: 'id', optionsText: 'text'"
                                ></select>
                            </div>
                            <div class="col-sm-4">
                                <label for="bodyStyle" class="form-label"
                                    >Body Style</label
                                >
                                <select
                                    class="form-control"
                                    id="bodyStyle"
                                    data-bind="value: bodyStyle, options: bodyStyleOptions, optionsValue: 'id', optionsText: 'text'"
                                ></select>
                            </div>
                            <div class="col-sm-4">
                                <label for="specialVehicle" class="form-label"
                                    >Special Vehicle</label
                                >
                                <select
                                    class="form-control"
                                    id="specialVehicle"
                                    data-bind="value: specialVehicle, options: specialVehicleOptions, optionsValue: 'id', optionsText: 'text'"
                                ></select>
                            </div>
                            <div class="col-12">
                                <div class="row g-3 profile-actions">
                                    <div class="col-12 col-sm-4 offset-sm-4">
                                        <button
                                            class="btn btn-danger w-100"
                                            data-bind="click: clearProfile"
                                        >
                                            Clear
                                        </button>
                                    </div>
                                    <div class="col-12 col-sm-4">
                                        <button
                                            class="btn btn-primary w-100"
                                            data-bind="click: submitProfile"
                                        >
                                            Submit
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %} {% block js %}
<script
    type="text/javascript"
    src="{{ url_for('static', filename='js/profile.js') }}"
></script>
{% endblock %}
