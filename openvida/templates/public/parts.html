{% extends "layout.html" %}
{% block page_title %}Parts{% if part["description"] %} - {{ part["description"] }}{% endif %}{%endblock%}
{% block content %}
<div class="content-shell content-gradient">
	<div class="container-fluid py-3">
        <script type="text/html" id="panels">
            <div
                class="row m-0 row-cols-1 row-cols-sm-2 row-cols-md-3 g-3"
                data-bind="foreach: $root.catalogue()"
            >
                <div class="col">
                    <a
                        class="card shadow-sm clickable text-decoration-none"
                        data-bind="attr: {href: $parent.componentPath($data)}"
                    >
                        <!--data-bind="click: $root.loadChildren"-->
                        <img
                            class="bd-placeholder-img card-img-top bg-secondary"
                            width="100%"
                            height="200px"
                            role="img"
                            data-bind="attr: {src: $root.attachmentPath($data)}"
                        />
                        <div class="card-body">
                            <b
                                class="card-text"
                                data-bind="text: $data.description"
                            ></b>
                            <p class="card-text" data-bind="text: $data.note"></p>
                        </div>
                    </a>
                </div>
            </div>
        </script>
        <script type="text/html" id="table">
            <div class="row m-0 g-3 px-3">
                <div class="col-12 col-lg-6 order-lg-2">
                    <div class="content-panel p-3 d-flex flex-column gap-1">
                        <span class="h4 fw-semibold">Component Diagram</span>
                        <img
                            class="w-100 object-fit-contain rounded bd-placeholder-img bg-white"
                            style="max-height: 600px"
                            role="img"
                            data-bind="attr: {src: attachmentPath(component())}"
                        />
                        <p class="m-0">
                            <span class="fs-5 fw-semibold">{{ part["description"] }}</span>
                            <span>{{ part["note"] }}</span>
                        </p>
                    </div>
                </div>
                <div class="col-12 col-lg-6 order-lg-1">
                    <div class="content-panel pt-2">
                        <table class="table table-sm table-striped caption-top">
                            <caption class="h4 fw-semibold ps-3">Component List</caption>
                            <thead>
                                <tr>
                                    <td class="ps-3">Key</td>
                                    <td>Part Number</td>
                                    <td>Qty.</td>
                                    <td>Description</td>
                                    <td class="pe-3">Note</td>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- ko foreach: catalogue -->
                                <tr>
                                    <td class="ps-3"><span data-bind="text: key"></span></td>
                                    <td>
                                        <a
                                            data-bind="text: number, attr: { href: `/part/${number()}` }"
                                        ></a>
                                    </td>
                                    <td><span data-bind="text: quantity"></span></td>
                                    <td><span data-bind="text: description"></span></td>
                                    <td class="pe-3"><span data-bind="text: note"></span></td>
                                </tr>
                                <!-- /ko -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </script>
        <div
            class="d-flex flex-column w-100 h-100 overflow-y-auto"
            id="partContent"
            data-bind="template: { name: layoutTemplate(), data: $root}"
        ></div>
    </div>
</div>
{% endblock %} {% block js%}
<script type="text/javascript">
    const COMPONENT = {{ part | tojson }};
    const COMPONENT_PATH = {{path | tojson }};
</script>
<script
    type="text/javascript"
    src="{{ url_for('static', filename='js/parts.js') }}"
></script>
{% endblock %}
