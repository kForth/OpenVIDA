{% extends "layout.html" %}
{% block page_title %}Document{%endblock%}

{% block css %}
<style>
    .document-shell {
        width: 100%;
        min-height: 100%;
        background:
            radial-gradient(circle at 10% 5%, rgba(13, 110, 253, 0.1), transparent 30%),
            radial-gradient(circle at 90% 15%, rgba(25, 135, 84, 0.1), transparent 28%);
    }

    .document-panel {
        background: var(--bs-body-bg);
        border: 1px solid rgba(var(--bs-emphasis-color-rgb), 0.12);
        border-radius: 1rem;
        box-shadow: 0 0.75rem 1.8rem rgba(15, 23, 42, 0.08);
    }

    .vida-document {
        line-height: 1.65;
    }

    .vida-document img {
        max-width: 100%;
        height: auto;
    }
}</style>
{% endblock %}
{% block content %}
<div class="document-shell py-4">
    <div class="container py-3 py-lg-4">
        <div class="document-panel mx-auto p-4 p-lg-5" style="max-width: 1100px;">
            <div class="vida-document">{{ content | safe }}</div>
        </div>
    </div>
</div>
{% endblock %} {% block js %}
<script
    type="text/javascript"
    src="{{ url_for('static', filename='js/document.js') }}"
></script>
{% endblock %}
