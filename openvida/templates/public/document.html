{% extends "layout.html" %}
{% block page_title %}Document{%endblock%}
{% block content %}
<div class="content-shell content-gradient py-4">
    <div class="container py-3 py-lg-4">
        <div class="content-panel mx-auto p-4 p-lg-5 document-print-page" style="max-width: 1100px;">
            <div class="document-print-actions d-flex justify-content-end mb-3">
                <button
                    type="button"
                    class="btn btn-outline-secondary"
                    onclick="window.print()"
                    aria-label="Print this VIDA document"
                >
                    <i class="bi bi-printer me-2" aria-hidden="true"></i>
                    Print
                </button>
            </div>
            <div class="vida-document">{{ content | safe }}</div>
        </div>
    </div>
</div>
{% endblock %} {% block js %}
<script
    type="text/javascript"
    src="{{ url_for('static', filename='js/document.js') }}"
></script>
{% endblock %}
